<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#7850ff"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <text x="320" y="140" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white">ZECRU</text>
  <text x="320" y="200" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="url(#accent)">15 CLUES</text>
  <text x="320" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">One word. One chance. Crack the code.</text>
  <rect x="220" y="280" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
</svg>
