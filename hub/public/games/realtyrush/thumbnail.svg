<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>
  <!-- Board outline -->
  <rect x="120" y="30" width="160" height="160" rx="4" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <rect x="130" y="40" width="140" height="140" rx="2" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Side colors -->
  <line x1="120" y1="190" x2="280" y2="190" stroke="#e74c3c" stroke-width="3" opacity="0.6"/>
  <line x1="280" y1="30" x2="280" y2="190" stroke="#3498db" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="30" x2="280" y2="30" stroke="#2ecc71" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="30" x2="120" y2="190" stroke="#f1c40f" stroke-width="3" opacity="0.6"/>
  <!-- Corner dots -->
  <circle cx="120" cy="190" r="6" fill="#00d4aa" opacity="0.8"/>
  <circle cx="120" cy="30" r="6" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="280" cy="30" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="280" cy="190" r="6" fill="#f59e0b" opacity="0.8"/>
  <!-- Player tokens -->
  <circle cx="145" cy="170" r="5" fill="#e74c3c" stroke="white" stroke-width="1.5"/>
  <circle cx="260" cy="110" r="5" fill="#3498db" stroke="white" stroke-width="1.5"/>
  <circle cx="200" cy="50" r="5" fill="#2ecc71" stroke="white" stroke-width="1.5"/>
  <!-- Some property squares -->
  <rect x="148" y="182" width="12" height="12" rx="1" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-width="0.5"/>
  <rect x="168" y="182" width="12" height="12" rx="1" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-width="0.5"/>
  <rect x="188" y="182" width="12" height="12" rx="1" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <rect x="208" y="182" width="12" height="12" rx="1" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="0.5"/>
  <rect x="228" y="182" width="12" height="12" rx="1" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <!-- Title -->
  <text x="200" y="118" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="22" fill="white">Realty</text>
  <text x="200" y="142" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="22" fill="url(#accent)">Rush</text>
  <!-- Subtitle -->
  <text x="200" y="215" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Buy. Build. Bankrupt your friends.</text>
</svg>
