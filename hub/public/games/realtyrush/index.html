<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealtyRush — Real Estate Board Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
  <!-- LOBBY SCREEN -->
  <div id="lobby" class="screen active">
    <div class="lobby-container">
      <h1 class="logo">Realty<span>Rush</span></h1>
      <p class="tagline">Buy. Build. Bankrupt your friends.</p>

      <!-- Multiplayer / Local Toggle -->
      <div class="lobby-tabs">
        <button class="lobby-tab active" id="tabLocal" onclick="game.switchLobbyTab('local')">Local Game</button>
        <button class="lobby-tab" id="tabOnline" onclick="game.switchLobbyTab('online')">Online Multiplayer</button>
      </div>

      <!-- ONLINE LOBBY -->
      <div class="lobby-card" id="onlineLobby" style="display:none">
        <h2>Online Multiplayer</h2>
        <div id="onlinePreRoom">
          <label>Your Name</label>
          <input type="text" id="onlineName" value="" maxlength="12" placeholder="Enter your name" class="lobby-input">

          <div class="online-btns">
            <button class="btn-primary" id="createRoomBtn" onclick="game.createRoom()">Create Room</button>
            <div class="join-row">
              <input type="text" id="roomCodeInput" maxlength="6" placeholder="ROOM CODE" class="lobby-input code-input">
              <button class="btn-primary btn-join" onclick="game.joinRoom()">Join</button>
            </div>
          </div>
        </div>

        <!-- Room Waiting Area -->
        <div id="roomWaiting" style="display:none">
          <div class="room-code-display">
            <label>Room Code</label>
            <div class="room-code" id="roomCodeDisplay">----</div>
            <p class="room-hint">Share this code with friends</p>
          </div>

          <label>Players <span id="lobbyPlayerCount">1</span>/6</label>
          <div id="lobbyPlayerList" class="lobby-player-list"></div>

          <label>Game Mode</label>
          <div class="mode-select">
            <button class="mode-btn active" data-mode="quick" data-lobby="online">Quick<br><small>~1 hr • $60k start</small></button>
            <button class="mode-btn" data-mode="standard" data-lobby="online">Standard<br><small>~2 hrs • $80k start</small></button>
            <button class="mode-btn" data-mode="empire" data-lobby="online">Empire<br><small>~3-4 hrs • $100k start</small></button>
          </div>

          <div id="onlineQuickTarget" class="target-row">
            <label>Target Net Worth: $<input type="number" id="onlineTargetNetWorth" value="500000" min="100000" step="50000"></label>
          </div>

          <button id="startOnlineGame" class="btn-primary btn-large" style="display:none">Start Game</button>
          <p id="waitingMsg" class="waiting-msg">Waiting for host to start...</p>
        </div>

        <div id="connectionStatus" class="conn-status"></div>
      </div>

      <!-- LOCAL LOBBY -->
      <div class="lobby-card" id="localLobby">
        <h2>Local Game</h2>

        <label>Players (2–6)</label>
        <div class="player-setup" id="playerSetup">
          <div class="player-row">
            <span class="player-color" style="background:#e74c3c"></span>
            <input type="text" value="Player 1" maxlength="12" data-idx="0">
          </div>
          <div class="player-row">
            <span class="player-color" style="background:#3498db"></span>
            <input type="text" value="Player 2" maxlength="12" data-idx="1">
          </div>
        </div>
        <div class="player-btns">
          <button id="addPlayer" class="btn-sm">+ Add Player</button>
          <button id="removePlayer" class="btn-sm btn-danger">- Remove</button>
        </div>

        <label>Game Mode</label>
        <div class="mode-select">
          <button class="mode-btn active" data-mode="quick" data-lobby="local">Quick<br><small>~1 hr • $60k start</small></button>
          <button class="mode-btn" data-mode="standard" data-lobby="local">Standard<br><small>~2 hrs • $80k start</small></button>
          <button class="mode-btn" data-mode="empire" data-lobby="local">Empire<br><small>~3-4 hrs • $100k start</small></button>
        </div>

        <div id="quickTarget" class="target-row">
          <label>Target Net Worth: $<input type="number" id="targetNetWorth" value="500000" min="100000" step="50000"></label>
        </div>

        <button id="startGame" class="btn-primary btn-large">Start Local Game</button>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="screen">
    <!-- Top Bar -->
    <div id="topBar">
      <div class="round-info">Round <span id="roundNum">1</span></div>
      <div class="turn-info"><span id="turnPlayerName">Player 1</span>'s Turn</div>
      <div class="mode-info" id="modeInfo">Quick Game</div>
    </div>

    <!-- Board -->
    <div id="boardWrap">
      <canvas id="boardCanvas"></canvas>
      <!-- Minimap -->
      <canvas id="minimap" width="160" height="160"></canvas>
    </div>

    <!-- Player HUD (bottom) -->
    <div id="playerHUD">
      <div id="hudPlayers"></div>
    </div>

    <!-- Action Panel (right side) -->
    <div id="actionPanel" class="panel hidden">
      <div id="actionTitle" class="panel-title">Action</div>
      <div id="actionBody"></div>
    </div>

    <!-- Stock Ticker (collapsible) -->
    <div id="stockTicker" class="collapsed">
      <div id="stockToggle" class="stock-header">Stock Market <span class="arrow">▼</span></div>
      <div id="stockBody" class="stock-body"></div>
    </div>

    <!-- Roll Button -->
    <button id="rollBtn" class="roll-btn hidden">Roll</button>

    <!-- Roll Flash -->
    <div id="rollFlash" class="roll-flash hidden"></div>

    <!-- End Turn -->
    <button id="endTurnBtn" class="end-turn-btn hidden">End Turn</button>

    <!-- Cartel Card Hand -->
    <div id="cartelHand" class="cartel-hand hidden">
      <div class="cartel-hand-title">Cartel Cards</div>
      <div id="cartelCards"></div>
    </div>

    <!-- Portfolio Button -->
    <button id="portfolioBtn" class="portfolio-btn" onclick="game.togglePortfolio()">Portfolio</button>

    <!-- Portfolio Panel -->
    <div id="portfolioPanel" class="portfolio-panel hidden">
      <div class="portfolio-header">
        <span class="portfolio-title">Business Portfolio</span>
        <button class="portfolio-close" onclick="game.togglePortfolio()">&times;</button>
      </div>
      <div id="portfolioBody" class="portfolio-body"></div>
    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalBody" class="modal-body"></div>
      <div id="modalActions" class="modal-actions"></div>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOver" class="screen">
    <div class="gameover-container">
      <h1 id="winnerTitle">Game Over</h1>
      <p id="winnerDesc"></p>
      <div id="finalStats"></div>
      <button id="playAgain" class="btn-primary btn-large">Play Again</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
