<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="50%" style="stop-color:#2a1122"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Silhouette figures -->
  <circle cx="180" cy="200" r="28" fill="#333" opacity="0.6"/>
  <rect x="162" y="228" width="36" height="50" rx="10" fill="#333" opacity="0.6"/>

  <circle cx="280" cy="195" r="28" fill="#333" opacity="0.6"/>
  <rect x="262" y="223" width="36" height="50" rx="10" fill="#333" opacity="0.6"/>

  <circle cx="380" cy="198" r="28" fill="#ff4444" opacity="0.7"/>
  <rect x="362" y="226" width="36" height="50" rx="10" fill="#ff4444" opacity="0.5"/>
  <text x="380" y="207" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#fff">?</text>

  <circle cx="480" cy="202" r="28" fill="#333" opacity="0.6"/>
  <rect x="462" y="230" width="36" height="50" rx="10" fill="#333" opacity="0.6"/>

  <!-- Title -->
  <text x="320" y="80" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="url(#accent)">WHO'S THE</text>
  <text x="320" y="125" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="42" font-weight="900" fill="#ffffff">IMPOSTER?</text>

  <!-- Tagline -->
  <text x="320" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">One word. One liar. Find the imposter.</text>
  <rect x="220" y="340" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.4"/>
</svg>
