<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critter Colony</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
</head>
<body>
  <!-- TITLE SCREEN -->
  <div id="titleScreen" class="title-screen"></div>

  <!-- GAME UI (hidden until game starts) -->
  <div id="gameUI" class="hidden">
    <!-- Resource Bar -->
    <div id="resourceBar">
      <div class="res-item"><span class="res-icon" style="background:#6d4c41"></span><span id="resWood">0</span> Wood <span class="res-rate" id="rateWood"></span></div>
      <div class="res-item"><span class="res-icon" style="background:#78909c"></span><span id="resStone">0</span> Stone <span class="res-rate" id="rateStone"></span></div>
      <div class="res-item"><span class="res-icon" style="background:#7cb342"></span><span id="resFood">0</span> Food <span class="res-rate" id="rateFood"></span></div>
      <div class="res-item"><span class="res-icon" style="background:#b0bec5"></span><span id="resIron">0</span> Iron <span class="res-rate" id="rateIron"></span></div>
      <div class="res-divider"></div>
      <div class="res-item"><span class="res-icon trap-icon"></span><span id="trapCount">0</span> Traps</div>
      <div class="res-item"><span class="res-icon" style="background:#ffd54f;border-radius:2px"></span><span id="ammoCount">30</span> Ammo</div>
      <div class="res-item critter-counter"><span id="critterCount">0/4</span> Critters</div>
      <div class="res-item" style="color:#ffd700"><span class="res-icon" style="background:#ffd700;border-radius:50%"></span><span id="aethershardCount">0</span> Aethershards</div>
      <div class="res-divider"></div>
      <div class="res-item res-dead" id="deadCount" title="Fallen critters" style="display:none">💀 <span>0</span></div>
      <div class="res-item res-horde" id="hordeTimer" title="Next horde attack">⚔️ 15:00</div>
      <div class="res-item res-time" id="gameTime">0:00</div>
      <div class="res-actions">
        <button class="res-btn" id="pauseBtn" onclick="game.togglePause()" title="Pause">⏸</button>
        <button class="res-btn" id="settingsBtn" onclick="game.toggleSettings()" title="Settings">⚙</button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header"><span>Settings</span><button class="wb-close" onclick="game.toggleSettings()">✕</button></div>
      <div class="settings-body">
        <label class="setting-row"><span>Master Volume</span><input type="range" id="setVolume" min="0" max="100" value="50" oninput="game.applySetting('volume',this.value)"><span id="setVolumeVal">50%</span></label>
        <label class="setting-row"><span>Sound FX</span><input type="checkbox" id="setSfx" checked onchange="game.applySetting('sfx',this.checked)"></label>
        <label class="setting-row"><span>Zoom / FOV</span><input type="range" id="setZoom" min="50" max="200" value="100" oninput="game.applySetting('zoom',this.value)"><span id="setZoomVal">100%</span></label>
        <label class="setting-row"><span>Mouse Sensitivity</span><input type="range" id="setSens" min="25" max="200" value="100" oninput="game.applySetting('sensitivity',this.value)"><span id="setSensVal">100%</span></label>
        <label class="setting-row"><span>Show FPS</span><input type="checkbox" id="setFps" onchange="game.applySetting('fps',this.checked)"></label>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="pause-overlay hidden">
      <div class="pause-content">
        <h2>PAUSED</h2>
        <p>Press ESC or click Resume to continue</p>
        <button class="title-btn title-continue" onclick="game.togglePause()">Resume</button>
      </div>
    </div>

    <!-- Side Panel -->
    <div id="sidePanel">
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabBuildings">Build</button>
        <button class="panel-tab" id="tabCritters">Critters</button>
        <button class="panel-tab" id="tabManage">Manage</button>
        <button class="panel-tab" id="tabResearch">Research</button>
      </div>
      <div id="panelBody" class="panel-body"></div>
    </div>

    <!-- Controls hint -->
    <div id="controlsHint">WASD move | Hold Click shoot | Hold Q mine/chop | E capture/claim | T waypoints | M map | B build | ESC cancel</div>
  </div>

  <!-- CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <script src="cdn-assets.js"></script>
  <script src="sounds.js"></script>
  <script src="world.js"></script>
  <script src="critters.js"></script>
  <script src="buildings.js"></script>
  <script src="ui.js"></script>
  <script src="save.js"></script>
  <script src="game.js"></script>
</body>
</html>
