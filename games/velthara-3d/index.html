<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velthara's Dominion 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    /* HUD */
    #hud { position: fixed; top: 0; left: 0; right: 0; padding: 12px 20px; display: flex; align-items: center; gap: 20px; z-index: 10; pointer-events: none; }
    .hud-bar { height: 8px; background: #222; border-radius: 4px; flex: 1; max-width: 200px; overflow: hidden; position: relative; }
    .hud-fill { height: 100%; border-radius: 4px; transition: width 0.2s; }
    .hp-fill { background: linear-gradient(90deg, #ef4444, #f87171); }
    .xp-fill { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .hud-label { color: #fff; font-size: 0.75rem; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    .hud-wave { color: #ce93d8; font-size: 0.9rem; font-weight: 800; margin-left: auto; }

    /* Crosshair */
    #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.5); }
    #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
    #crosshair::after { width: 20px; height: 2px; top: 9px; left: 0; }

    /* Wave notification */
    #waveNotify { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 40px rgba(206,147,216,0.6); z-index: 20; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    #waveNotify.show { opacity: 1; }

    #killCount { position: fixed; bottom: 16px; right: 20px; color: #888; font-size: 0.8rem; font-weight: 600; z-index: 10; }

    /* Pause */
    #pauseBtn { position: fixed; top: 12px; right: 20px; padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5); color: #fff; font-size: 0.8rem; font-weight: 700; cursor: pointer; z-index: 15; }
    #pauseBtn:hover { background: rgba(255,255,255,0.1); }
    #pauseOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 50; display: flex; justify-content: center; align-items: center; }
    #pauseOverlay.hidden { display: none; }
    .pause-box { text-align: center; }
    .pause-box h2 { font-size: 3rem; font-weight: 900; color: #fff; letter-spacing: 4px; margin-bottom: 12px; }
    .pause-box p { color: #888; margin-bottom: 20px; }
    .pause-resume { padding: 14px 48px; border-radius: 12px; border: none; background: linear-gradient(135deg, #9966ff, #7744cc); color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .pause-resume:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(153,102,255,0.3); }

    /* Level Up Sigil Selection */
    #levelUpOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 40; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    #levelUpOverlay.hidden { display: none; }
    .lu-title { font-size: 2rem; font-weight: 900; color: #fbbf24; margin-bottom: 8px; text-shadow: 0 0 20px rgba(251,191,36,0.4); }
    .lu-sub { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
    .lu-cards { display: flex; gap: 16px; }
    .lu-card { width: 180px; padding: 20px 16px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.1); background: rgba(20,20,40,0.95); cursor: pointer; transition: all 0.2s; text-align: center; }
    .lu-card:hover { border-color: #9966ff; transform: translateY(-4px); box-shadow: 0 8px 30px rgba(153,102,255,0.3); }
    .lu-card-icon { font-size: 2rem; margin-bottom: 8px; }
    .lu-card-name { font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .lu-card-desc { font-size: 0.75rem; color: #aaa; line-height: 1.4; }
    .lu-card-rarity { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .lu-card.common { border-color: rgba(170,170,170,0.3); }
    .lu-card.rare { border-color: rgba(255,193,7,0.3); }
    .lu-card.epic { border-color: rgba(156,39,176,0.3); }
    .lu-card.legendary { border-color: rgba(255,152,0,0.4); background: rgba(40,20,10,0.95); }
  </style>
</head>
<body>
  <div id="hud">
    <span class="hud-label">HP</span>
    <div class="hud-bar"><div class="hud-fill hp-fill" id="hpBar" style="width:100%"></div></div>
    <span class="hud-label">XP</span>
    <div class="hud-bar"><div class="hud-fill xp-fill" id="xpBar" style="width:0%"></div></div>
    <span class="hud-label" id="levelLabel">Lv.1</span>
    <span class="hud-wave" id="waveLabel">Wave 1</span>
  </div>
  <div id="crosshair"></div>
  <div id="waveNotify"></div>
  <div id="killCount">Kills: 0</div>
  <button id="pauseBtn" onclick="window.togglePause()">⏸ Pause</button>

  <!-- Pause Overlay -->
  <div id="pauseOverlay" class="hidden">
    <div class="pause-box">
      <h2>PAUSED</h2>
      <p>Press ESC to resume</p>
      <button class="pause-resume" onclick="window.togglePause()">Resume</button>
    </div>
  </div>

  <!-- Level Up Sigil Selection -->
  <div id="levelUpOverlay" class="hidden">
    <div class="lu-title">LEVEL UP!</div>
    <div class="lu-sub">Choose a sigil upgrade</div>
    <div class="lu-cards" id="sigilCards"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
