<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Critter Colony</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
</head>
<body>
  <!-- TITLE SCREEN -->
  <div id="titleScreen" class="title-screen"></div>

  <!-- GAME UI (hidden until game starts) -->
  <div id="gameUI" class="hidden">
    <!-- Resource Bar -->
    <div id="resourceBar">
      <div class="res-item"><img class="res-img" id="riWood" src="" alt=""><span id="resWood">0</span> Wood <span class="res-rate" id="rateWood"></span></div>
      <div class="res-item"><img class="res-img" id="riStone" src="" alt=""><span id="resStone">0</span> Stone <span class="res-rate" id="rateStone"></span></div>
      <div class="res-item"><img class="res-img" id="riFood" src="" alt=""><span id="resFood">0</span> Food <span class="res-rate" id="rateFood"></span></div>
      <div class="res-item"><img class="res-img" id="riIron" src="" alt=""><span id="resIron">0</span> Iron <span class="res-rate" id="rateIron"></span></div>
      <div class="res-item" id="resOilWrap" style="display:none"><img class="res-img" id="riOil" src="" alt=""><span id="resOil">0</span> Oil</div>
      <div class="res-item" id="resGoldWrap" style="display:none"><img class="res-img" id="riGold" src="" alt=""><span id="resGold">0</span> Gold</div>
      <div class="res-item" id="resDiamondWrap" style="display:none"><img class="res-img" id="riDiamond" src="" alt=""><span id="resDiamond">0</span> Diamond</div>
      <div class="res-item" id="resGasWrap" style="display:none"><img class="res-img" id="riGas" src="" alt=""><span id="resGas">0</span> Gas</div>
      <div class="res-divider"></div>
      <div class="res-item"><img class="res-img" id="riTrap" src="" alt=""><span id="trapCount">0</span> Traps</div>
      <div class="res-item"><img class="res-img" id="riAmmo" src="" alt=""><span id="ammoCount">30</span> Ammo</div>
      <div class="res-item critter-counter"><span id="critterCount">0/4</span> Critters</div>
      <div class="res-item" style="color:#ffd700"><img class="res-img" id="riAether" src="" alt=""><span id="aethershardCount">0</span> Aethershards</div>
      <div class="res-divider"></div>
      <div class="res-item res-dead" id="deadCount" title="Fallen critters" style="display:none">💀 <span>0</span></div>
      <div class="res-item res-horde" id="hordeTimer" title="Next horde attack">⚔️ 15:00</div>
      <div class="res-item res-time" id="gameTime">0:00</div>
      <div class="res-actions">
        <button class="res-btn" id="pauseBtn" onclick="game.togglePause()" title="Pause">⏸</button>
        <button class="res-btn" id="settingsBtn" onclick="game.toggleSettings()" title="Settings">⚙</button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header"><span>Settings</span><button class="wb-close" onclick="game.toggleSettings()">✕</button></div>
      <div class="settings-body">
        <label class="setting-row"><span>Master Volume</span><input type="range" id="setVolume" min="0" max="100" value="50" oninput="game.applySetting('volume',this.value)"><span id="setVolumeVal">50%</span></label>
        <label class="setting-row"><span>Sound FX</span><input type="checkbox" id="setSfx" checked onchange="game.applySetting('sfx',this.checked)"></label>
        <label class="setting-row"><span>Zoom / FOV</span><input type="range" id="setZoom" min="50" max="200" value="100" oninput="game.applySetting('zoom',this.value)"><span id="setZoomVal">100%</span></label>
        <label class="setting-row"><span>Mouse Sensitivity</span><input type="range" id="setSens" min="25" max="200" value="100" oninput="game.applySetting('sensitivity',this.value)"><span id="setSensVal">100%</span></label>
        <label class="setting-row"><span>Show FPS</span><input type="checkbox" id="setFps" onchange="game.applySetting('fps',this.checked)"></label>
      </div>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="pause-overlay hidden">
      <div class="pause-content">
        <h2>PAUSED</h2>
        <p>Press ESC or click Resume to continue</p>
        <button class="title-btn title-continue" onclick="game.togglePause()">Resume</button>
      </div>
    </div>

    <!-- Build Menu Modal (B key) -->
    <div id="buildModal" class="build-modal hidden">
      <div class="build-modal-content">
        <div class="build-modal-header">
          <h2>Build Menu</h2>
          <button class="build-modal-close" onclick="game.closeBuildMenu()">&times;</button>
        </div>
        <div class="build-modal-tabs">
          <button class="bm-tab active" data-tab="buildings" onclick="game.switchBuildTab('buildings')">Buildings</button>
          <button class="bm-tab" data-tab="critters" onclick="game.switchBuildTab('critters')">Critters</button>
          <button class="bm-tab" data-tab="manage" onclick="game.switchBuildTab('manage')">Manage</button>
          <button class="bm-tab" data-tab="research" onclick="game.switchBuildTab('research')">Research</button>
        </div>
        <div id="buildModalBody" class="build-modal-body"></div>
      </div>
    </div>

    <!-- Controls hint -->
    <div id="controlsHint">WASD move | Hold Click shoot | Hold Q mine/chop | E capture/claim | T waypoints | M map | B build | ESC cancel</div>
  </div>

  <!-- CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <script src="cdn-assets.js"></script>
  <script src="sounds.js"></script>
  <script src="world.js"></script>
  <script src="critters.js"></script>
  <script src="buildings.js"></script>
  <script src="ui.js"></script>
  <script src="save.js"></script>
  <script src="game.js"></script>
</body>
</html>
